<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

<div class="container">
    <h2>Skin Disease Prediction Result</h2>

    <img src="/{{ image_path }}" style="width:220px; border-radius:12px; margin:15px 0;">

    <p><strong>Disease:</strong> {{ disease }}</p>
    <p><strong>Confidence:</strong> {{ confidence }}%</p>
    <p><strong>Why this happens:</strong><br>{{ reason }}</p>
    <p><strong>Precaution:</strong> {{ precaution }}</p>

    <a href="/home">Predict Another Image</a>
</div>

</body>
</html>
